# ───────────────────────────────────────
#  🎾 테니스 알림 설정표
#  이 표를 고치면 다음 점검(최대 5분)부터 반영됩니다.
#  · 받기: true(알림 받기) / false(끄기)
#  · 시간: 시작 시각 숫자만 — 20 = 저녁 8시
#  · 요일별로 적거나, 매일 같으면 '매일'로 한 줄
#  · '평일'(월~금)·'주말'(토·일) 묶음 키도 쓸 수 있음
#  · 특정 코트만 다르게: 시설 아래 '코트추가'에 "센터 코트명"으로 (아래 강남 예시 참고)
# ───────────────────────────────────────

강남:                      # 포이·세곡 (1시간 단위)
  받기: true
  매일: [19, 20, 21]       # 매일 저녁 7·8·9시
  # ── 특정 코트만 시간 더하기(선택) — 아래 #을 지우고 쓰면 그 코트만 '공통 + 추가' 둘 다 감시 ──
  # 코트추가:
  #   포이 코트A:           # 코트 이름 = "센터 코트명" (포이 코트A·코트B / 세곡 1~4번코트)
  #     평일: [7]           # 예: 코트A는 공통 저녁 + 평일(월~금) 아침 7시도

송파:
  받기: true
  토: [8, 10]              # 토요일 오전 8·10시

잠실:                      # 2시간 단위 시설(…16·18·20시)
  받기: true               # ← 잠깐 끄려면 false 로만 바꾸면 끝
  토: [8, 10, 18, 20]
  일: [18, 20]
  월: [20]
  화: [20]
  수: [20]

대치유수지:                  # 2시간 단위(07~09 … 19~21), 로그인 없음. 조회는 15분·08~24시(코드 상수)
  받기: true               # 끄려면 false 로만 바꾸면 끝
  평일: [19]               # 월~금: 저녁 7시(19~21)
  토: [7, 9, 19]           # 토요일: 오전 7·9시 + 저녁 7시
  # 일요일은 줄 없음 = 감시 안 함
