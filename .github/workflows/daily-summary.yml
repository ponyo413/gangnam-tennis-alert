# .github/workflows/daily-summary.yml
# 매일 아침 8시(KST) '현재 빈자리 전체'를 요약 1통 발송 — 직전기록(state) 불필요
name: 빈자리 요약

on:
  schedule:
    - cron: "0 23 * * *"   # UTC 23:00 = KST 08:00
  workflow_dispatch:

jobs:
  summary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: 라이브러리 설치
        run: pip install -r requirements.txt
      # 5분 점검(check.yml)이 쌓은 실패 카운트를 같은 캐시에서 읽어와 요약에 보고.
      - name: 직전 기록 복원(실패 카운트 공유)
        uses: actions/cache@v4
        with:
          path: |
            state.json
            status.json
            failures.json
          key: tennis-state-v4-${{ github.run_id }}
          restore-keys: tennis-state-v4-
      - name: 빈자리 요약 발송
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SONGPA_ID: ${{ secrets.SONGPA_ID }}
          SONGPA_PW: ${{ secrets.SONGPA_PW }}
        run: python -m src.main summary
