# .github/workflows/daily-summary.yml
# '현재 빈자리 전체'를 요약 1통 발송 — 직전기록(state) 불필요.
# ※ 매일 자동 발송은 check.yml(5분 점검)이 아침 8시대에 담당하도록 옮겼다.
#    (GitHub 무료 예약타이머가 1시간씩 늦잠 자던 문제 → 제시간에 도는 5분 점검에 얹음)
#    그래서 여기 자동 예약(schedule)은 제거하고, 손으로 직접 돌려보는 용도만 남긴다.
name: 빈자리 요약(수동)

on:
  workflow_dispatch:   # Actions 탭에서 손으로 실행해 볼 때만 사용

jobs:
  summary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: 라이브러리 설치
        run: pip install -r requirements.txt
      # 5분 점검(check.yml)이 쌓은 실패 카운트를 같은 캐시에서 읽어와 요약에 보고.
      # 캐시 목록을 check.yml과 똑같이 맞춘다 — 두 워크플로가 같은 캐시(tennis-state-v4)를 공유하므로,
      # 여기서 한 파일이라도 빠뜨리면 이 워크플로가 cache를 저장할 때 그 파일이 누락되고,
      # 다음 check.yml이 그 캐시를 복원할 때 초기화된다(daechi_*=15분 게이트·직전 박제, read_fail=연속실패 카운트).
      - name: 직전 기록 복원(실패 카운트 공유)
        uses: actions/cache@v4
        with:
          path: |
            state.json
            status.json
            failures.json
            read_fail.json
            summary_sent.json
            daechi_slots.json
            daechi_fetch.json
          key: tennis-state-v4-${{ github.run_id }}
          restore-keys: tennis-state-v4-
      - name: 빈자리 요약 발송
        timeout-minutes: 7       # 무한정 매달리지 않게 상한
        continue-on-error: true  # 7분을 넘겨 강제 종료돼도 '실패'로 기록하지 않음(메일 방지)
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SONGPA_ID: ${{ secrets.SONGPA_ID }}
          SONGPA_PW: ${{ secrets.SONGPA_PW }}
        run: python -m src.main summary
