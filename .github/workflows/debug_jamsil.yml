# .github/workflows/debug_jamsil.yml
# 잠실 '접수시간' 검증용 임시 워크플로 — 시각별 status_e 변화를 보려고 낮/저녁/밤 자동 실행.
# ⚠️ cron 포함! 확인 끝나면 반드시 이 파일을 삭제해야 매일 도는 것을 멈춘다.
name: 잠실 디버그

on:
  workflow_dispatch:        # 지금 즉시 1회(접수시간 대조)
  schedule:
    - cron: "30 9 * * *"    # 18:30 KST — 비접수시간(가설상 예약불가 폭증 예상)
    - cron: "0 13 * * *"    # 22:00 KST — 비접수시간(밤)
    - cron: "30 1 * * *"    # 10:30 KST — 접수시간(다시 정상 되는지 대조)

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: 라이브러리 설치
        run: pip install -r requirements.txt
      - name: 잠실 접수시간 검증
        env:
          SONGPA_ID: ${{ secrets.SONGPA_ID }}
          SONGPA_PW: ${{ secrets.SONGPA_PW }}
          PYTHONIOENCODING: utf-8
          PYTHONUTF8: "1"
        run: python scripts/debug_jamsil.py
