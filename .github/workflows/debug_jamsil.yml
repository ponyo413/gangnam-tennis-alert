# .github/workflows/debug_jamsil.yml
# 잠실 실측 확인용 임시 워크플로 — 손으로 1회만 실행(Run workflow). 확인 후 삭제.
# 잠실 사이트에서 빈자리 표가 실제로 읽히는지 송파(정상 기준)와 대조한다.
name: 잠실 디버그

on:
  workflow_dispatch:   # 자동 실행 없음. Actions 탭에서 손으로만 실행.

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: 라이브러리 설치
        run: pip install -r requirements.txt
      - name: 잠실 구조 실측
        env:
          SONGPA_ID: ${{ secrets.SONGPA_ID }}     # 이미 저장된 송파 계정 재사용(비번 새로 입력 불필요)
          SONGPA_PW: ${{ secrets.SONGPA_PW }}
          PYTHONIOENCODING: utf-8                   # 한글 출력 깨짐 방지
          PYTHONUTF8: "1"
        run: python scripts/debug_jamsil.py
