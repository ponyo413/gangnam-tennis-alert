# .github/workflows/debug_jamsil.yml
# 잠실 시간칸 재확인용 임시 워크플로 — 손으로 1회만 실행. 확인 후 삭제.
# 예약가능만이 아니라 마감 칸까지 포함해 '저녁 시간칸이 실제로 있는지' 본다.
name: 잠실 디버그

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: 라이브러리 설치
        run: pip install -r requirements.txt
      - name: 잠실 시간칸 재확인
        env:
          SONGPA_ID: ${{ secrets.SONGPA_ID }}
          SONGPA_PW: ${{ secrets.SONGPA_PW }}
          PYTHONIOENCODING: utf-8
          PYTHONUTF8: "1"
        run: python scripts/debug_jamsil.py
