# 송파 로그인/빈자리 구조 디버그 (수동 실행 전용 — 확인 후 삭제 예정)
name: 송파 디버그

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: requests 설치
        run: pip install requests
      - name: 송파 로그인 디버그
        env:
          SONGPA_ID: ${{ secrets.SONGPA_ID }}
          SONGPA_PW: ${{ secrets.SONGPA_PW }}
        run: python scripts/debug_songpa.py
