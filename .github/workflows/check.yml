# 강남 테니스 빈자리 자동 점검 — 약 5분마다 실행
name: 빈자리 점검

on:
  schedule:
    - cron: "*/5 * * * *"   # 5분마다 (GitHub 최소 간격; 혼잡 시 지연될 수 있음)
  workflow_dispatch:         # 손으로도 실행해 볼 수 있게 (Actions 탭의 Run workflow)

# 같은 시각에 두 트리거(GitHub 예약 + 외부 cron-job.org)가 겹쳐 돌아도
# '한 번에 하나만' 실행되게 묶는다 → 8시 요약/빈자리 알림이 2통 가는 일 방지.
# cancel-in-progress: false = 이미 도는 점검은 끊지 않고, 다음 것이 끝나길 기다린다.
concurrency:
  group: tennis-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: 라이브러리 설치
        run: pip install -r requirements.txt

      # 직전 실행이 남긴 기록 불러오기 (없으면 그냥 첫 실행으로 시작)
      # 대치유수지(daechi_*)도 포함 — 빠지면 매 실행 초기화돼 15분 조회 게이트가 풀려
      # 5분마다 접속(매크로 금지 위반)하고, 직전 빈자리 박제가 사라져 가짜 변동 알림이 난다.
      - name: 직전 기록 복원
        uses: actions/cache@v4
        with:
          path: |
            state.json
            status.json
            failures.json
            read_fail.json
            summary_sent.json
            daechi_slots.json
            daechi_fetch.json
            olympic_state.json
          key: tennis-state-v4-${{ github.run_id }}
          restore-keys: tennis-state-v4-

      - name: 빈자리 점검 실행
        timeout-minutes: 7      # 무한정 매달리지 않게 상한(평소 30초; 모든 사이트 동시 먹통 극단엔 7분 근접 가능 → 아래 continue-on-error가 메일 차단)
        continue-on-error: true # 혹시 7분을 넘겨 강제 종료돼도 '실패'로 기록하지 않음(run failed 메일 방지). 봇 멈춤은 healthchecks가 따로 감시.
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SONGPA_ID: ${{ secrets.SONGPA_ID }}
          SONGPA_PW: ${{ secrets.SONGPA_PW }}
        run: python -m src.main

      # 봇이 한 바퀴 정상 완료했음을 외부 감시(healthchecks.io)에 알림.
      # 이 신호가 약 10분 끊기면 healthchecks.io가 텔레그램으로 "봇 멈춤"을 알린다.
      # HC_PING_URL 시크릿이 없으면 건너뜀(봇 동작에 영향 없음).
      - name: 살아있어 신호(healthchecks)
        if: always()   # 조회가 일부 실패해도 '봇은 살아있음'은 보냄
        run: |
          if [ -n "${{ secrets.HC_PING_URL }}" ]; then
            curl -fsS -m 10 --retry 3 "${{ secrets.HC_PING_URL }}" || true
          fi
